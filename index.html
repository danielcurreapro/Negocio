<div id="systemeModal" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <button class="custom-modal-close" id="closeModalBtn" aria-label="Cerrar ventana">&times;</button>
            <div class="custom-modal-header">
                <h3>¡Excelente decisión!</h3>
                <p>Completa tus datos a continuación para registrarte en el Sistema Autoduplicable y activar tu negocio hoy mismo.</p>
            </div>
            <div class="systeme-form-container">
                <script id="form-script-tag-24541894" src="https://danielcurrea46.systeme.io/public/remote/page/4209209290b5a71411ae2d3e760f99c27ecdc9e8.js"></script>
            </div>
        </div>
    </div>

    <style>
        .custom-modal-overlay {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 26, 15, 0.6); /* Tono verde oscuro traslúcido */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 20000; /* Por encima de la cabecera y el botón flotante */
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .custom-modal-overlay.modal-active {
            display: flex;
            opacity: 1;
        }

        .custom-modal-box {
            background-color: var(--white);
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(16, 53, 28, 0.25);
            border: 1px solid var(--glass-border);
            transform: translateY(-30px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-modal-overlay.modal-active .custom-modal-box {
            transform: translateY(0);
        }

        .custom-modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            line-height: 1;
        }

        .custom-modal-close:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .custom-modal-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .custom-modal-header h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .custom-modal-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Contenedor que aísla el comportamiento del script externo */
        .systeme-form-container {
            width: 100%;
            min-height: 200px; /* Previene saltos bruscos de pantalla mientras inyecta */
        }

        /* Ajuste responsivo para celulares */
        @media (max-width: 480px) {
            .custom-modal-box {
                padding: 35px 20px 25px 20px;
            }
            .custom-modal-header h3 {
                font-size: 1.5rem;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const modal = document.getElementById('systemeModal');
            const closeBtn = document.getElementById('closeModalBtn');
            
            // 1. Identificar el botón original de la sección de negocios
            // Buscamos el enlace dentro de la tarjeta de CTA final de la sección #negocio
            const ctaBusinessBtn = document.querySelector('.business-cta-box .btn-whatsapp');

            if (ctaBusinessBtn) {
                // Modificamos el comportamiento del botón para que no abra WhatsApp de golpe, sino el Modal
                ctaBusinessBtn.addEventListener('click', function(e) {
                    e.preventDefault(); // Detiene la redirección inmediata a WhatsApp
                    openSystemeModal();
                });
            }

            // Funciones de Control
            function openSystemeModal() {
                modal.classList.add('modal-active');
                document.body.style.overflow = 'hidden'; // Bloquea el scroll del fondo
            }

            function closeSystemeModal() {
                modal.classList.remove('modal-active');
                document.body.style.overflow = ''; // Libera el scroll
            }

            // Eventos para cerrar (Click en X, click afuera del contenedor blanco o tecla Escape)
            closeBtn.addEventListener('click', closeSystemeModal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeSystemeModal();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('modal-active')) {
                    closeSystemeModal();
                }
            });
        });
    </script>
